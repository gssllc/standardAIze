         offset="0"
         stop-color="#172554"
         id="stop3" />
      <stop
         offset="1"
         stop-color="#4733cf"
         id="stop4" />
    </linearGradient>
    <style
       id="style4">
      .letters { font-family: &quot;Trebuchet MS&quot;, Trebuchet, Arial, Helvetica, sans-serif; font-weight: 800; }
      .dark { fill: #231f20; }
      .ai { fill: url(#aiGradient); }
      .doc { fill: none; stroke: #123852; stroke-width: 16; stroke-linejoin: round; stroke-linecap: round; }
      .doc-detail { fill: none; stroke: #123852; stroke-width: 14; stroke-linecap: round; }
      .speed { fill: none; stroke: url(#iconGradient); stroke-width: 14; stroke-linecap: round; }
      .dot { fill: url(#iconGradient); }
      .sparkle { fill: url(#aiGradient); }
    </style>
    <linearGradient
