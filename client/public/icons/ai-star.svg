  <title
     id="title">JobSearch AI Trebuchet logo</title>
  <desc
     id="desc">Transparent SVG logo for JobSearch AI with Trebuchet font, a document icon, gradient AI sparkles, dark wordmark, and gradient AI letters.</desc>
  <defs
     id="defs4">
    <linearGradient
       id="iconGradient"
       x1="92"
       y1="255"
       x2="333"
       y2="158"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#123852"
         id="stop1" />
      <stop
         offset="1"
         stop-color="#45A8F8"
         id="stop2" />
    </linearGradient>
    <linearGradient
