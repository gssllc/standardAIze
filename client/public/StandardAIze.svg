  <title
     id="title">StandardAIze logo</title>
  <desc
     id="desc">Transparent SVG recreation of the StandardAIze logo with gradient AI letters and gradient AI sparkles inside the document icon, replacing the checkmark.</desc>
  <defs
     id="defs4">
    <linearGradient
       id="iconGradient"
       x1="92"
       y1="255"
       x2="333"
       y2="158"
       gradientUnits="userSpaceOnUse">
